<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Hub</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: Arial;
}

header {
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.search {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

.container {
    padding: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    gap: 10px;
}

.card {
    background: #0f172a;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card p {
    text-align: center;
    padding: 5px;
}

video {
    width: 100%;
    margin-top: 10px;
}

.episodes {
    text-align: center;
}

.episodes button {
    margin: 5px;
    padding: 8px;
    background: #1e293b;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>🔥 Anime Hub</header>

<input id="search" class="search" placeholder="Search anime..." onkeyup="searchAnime()">

<div class="container">
    <div id="animeList" class="grid"></div>

    <video id="player" controls></video>

    <div id="episodes" class="episodes"></div>
</div>

<script>
let animeData = {
    "Naruto": {
        image: "https://via.placeholder.com/300x180?text=Naruto",
        episodes: [
            "https://www.w3schools.com/html/mov_bbb.mp4",
            "https://www.w3schools.com/html/movie.mp4"
        ]
    }
};

function loadAnime(data = animeData) {
    let list = document.getElementById("animeList");
    list.innerHTML = "";

    for (let title in data) {
        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${data[title].image}">
            <p>${title}</p>
        `;

        card.onclick = () => showEpisodes(title);

        list.appendChild(card);
    }
}

function showEpisodes(title) {
    let epDiv = document.getElementById("episodes");
    epDiv.innerHTML = "";

    animeData[title].episodes.forEach((ep, i) => {
        let btn = document.createElement("button");
        btn.innerText = "Episode " + (i + 1);

        btn.onclick = () => {
            document.getElementById("player").src = ep;
        };

        epDiv.appendChild(btn);
    });
}

function searchAnime() {
    let value = document.getElementById("search").value.toLowerCase();
    let filtered = {};

    for (let title in animeData) {
        if (title.toLowerCase().includes(value)) {
            filtered[title] = animeData[title];
        }
    }

    loadAnime(filtered);
}

loadAnime();
</script>

</body>
</html>
